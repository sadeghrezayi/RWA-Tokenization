# Local dev infrastructure. Postgres for the API (Prisma).
# Port 5433 on the host to avoid clashing with any system Postgres.
services:
  postgres:
    image: postgres:16-alpine
    container_name: tokenization-postgres
    environment:
      POSTGRES_USER: tokenization
      POSTGRES_PASSWORD: tokenization
      POSTGRES_DB: tokenization
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenization"]
      interval: 2s
      timeout: 2s
      retries: 15

  # Self-hosted IPFS (FR-AO-2, C1): immutable legal-document storage.
  ipfs:
    image: ipfs/kubo:v0.34.1
    container_name: tokenization-ipfs
    ports:
      - "5001:5001" # HTTP API (localhost only in production runbooks)
    healthcheck:
      test: ["CMD-SHELL", "ipfs id >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
